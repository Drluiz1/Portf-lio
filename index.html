<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luiz Augusto - Desenvolvedor & Analista de Dados</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: #1f1f2e;
      color: #eee;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }

    body > *:not(#particles-js) {
      position: relative;
      z-index: 1;
    }

    header {
      background-color: rgba(39, 39, 58, 0.85);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(8px);
      border-radius: 0 0 15px 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      color: #6c63ff;
      font-size: 1.9rem;
      margin: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 28px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: #eee;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 10px;
      transition: background-color 0.3s, color 0.3s;
    }

    nav ul li a.active,
    nav ul li a:hover {
      background-color: #6c63ff;
      color: white;
      box-shadow: 0 0 12px #6c63ffcc;
    }

    main.hero {
      display: flex;
      align-items: center;
      gap: 32px;
      max-width: 900px;
      margin: 60px auto;
      padding: 40px 24px;
      flex-wrap: wrap;
      background: rgba(39, 39, 58, 0.6);
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(108, 99, 255, 0.3);
      backdrop-filter: blur(12px);
    }

    .hero-img img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #6c63ff;
      box-shadow: 0 0 15px #6c63ffcc;
      transition: transform 0.3s ease;
    }

    .hero-img img:hover {
      transform: scale(1.05);
    }

    .hero-text {
      flex: 1;
      min-width: 250px;
    }

    .hero-text h2 {
      font-size: 2.5rem;
      margin: 0 0 12px;
      color: #a59fff;
      text-shadow: 0 0 8px #6c63ffcc;
    }

    .hero-text p {
      font-size: 1.3rem;
      color: #d0cfffdd;
      margin-bottom: 24px;
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-links a {
      text-decoration: none;
      color: #fff;
      background-color: #6c63ff;
      padding: 10px 16px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 4px 12px #6c63ff99;
      transition: 0.3s ease;
    }

    .hero-links a:hover {
      background-color: #5548e0;
      box-shadow: 0 6px 18px #5548e0cc;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
    }

    footer a {
      text-decoration: none;
      background-color: #6c63ff;
      color: #fff;
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 12px;
      box-shadow: 0 4px 12px #6c63ffcc;
      transition: 0.3s ease;
    }

    footer a:hover {
      background-color: #4b44cc;
    }

    @media (max-width: 700px) {
      main.hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-links {
        justify-content: center;
      }

      .hero-links a {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <header>
    <h1>Luiz Augusto</h1>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Início</a></li>
        <li><a href="sobre.html">Sobre Mim</a></li>
        <li><a href="projetos.html">Projetos</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <div class="hero-img">
      <img src="Imagem do WhatsApp de 2025-05-24 à(s) 11.47.10_880f67c7 - Copia.jpg" alt="Foto de Luiz Augusto" />
    </div>
    <div class="hero-text">
      <h2>Olá, eu sou Luiz Augusto</h2>
      <p>Desenvolvedor Web & Analista de Dados</p>
      <div class="hero-links">
        <a href="https://github.com/Drluiz1" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/luiz-augusto2/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
        <a href="mailto:luizaugustoo2019@gmail.com"><i class="fas fa-envelope"></i> E-mail</a>
      </div>
    </div>
  </main>

  <footer>
    <a href="sobre.html">Ver Portfólio Completo</a>
  </footer>

  <script>
    particlesJS('particles-js', {
      "particles": {
        "number": {
          "value": 80,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#6c63ff"
        },
        "shape": {
          "type": "circle"
        },
        "opacity": {
          "value": 0.6,
          "random": true,
          "anim": {
            "enable": true,
            "speed": 1.5,
            "opacity_min": 0.2,
            "sync": false
          }
        },
        "size": {
          "value": 4,
          "random": true,
          "anim": {
            "enable": true,
            "speed": 3,
            "size_min": 0.5,
            "sync": false
          }
        },
        "line_linked": {
          "enable": true,
          "distance": 130,
          "color": "#6c63ff",
          "opacity": 0.3,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 1.5,
          "direction": "none",
          "random": true,
          "straight": false,
          "out_mode": "out",
          "bounce": false
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "grab"
          },
          "onclick": {
            "enable": true,
            "mode": "push"
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 180,
            "line_linked": {
              "opacity": 0.5
            }
          },
          "push": {
            "particles_nb": 4
          }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
